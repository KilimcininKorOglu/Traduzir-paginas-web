name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Firefox XPI
        run: cp "build/InPlacely_${{ steps.version.outputs.version }}_Firefox.zip" "build/InPlacely_${{ steps.version.outputs.version }}_Firefox.xpi"

      - name: Create Chrome CRX
        if: env.CRX_KEY != ''
        env:
          CRX_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "$CRX_KEY" > /tmp/crx-key.pem
          npx crx3 "build/InPlacely_${{ steps.version.outputs.version }}_Chromium/manifest.json" \
            --keyPath /tmp/crx-key.pem \
            --crxPath "build/InPlacely_${{ steps.version.outputs.version }}_Chromium.crx"
          rm /tmp/crx-key.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/*.zip
            build/*.xpi
            build/*.crx
