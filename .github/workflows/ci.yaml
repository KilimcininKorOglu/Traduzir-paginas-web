name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build extension
        run: npm run build:local-sourcemaps

      - name: Verify build output
        run: |
          test -f build/InPlacely_*_Firefox.zip || exit 1
          test -f build/InPlacely_*_Chromium.zip || exit 1

      - name: Validate manifest
        run: node -e "const m = require('./src/manifest.json'); if (m.manifest_version !== 3) process.exit(1)"

      - name: Upload Firefox build
        uses: actions/upload-artifact@v4
        with:
          name: firefox
          path: build/*Firefox.zip

      - name: Upload Chromium build
        uses: actions/upload-artifact@v4
        with:
          name: chromium
          path: build/*Chromium.zip
